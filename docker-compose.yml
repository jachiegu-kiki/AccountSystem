# ─── 新東方數據平台 · Auth Gateway ──────────────────────────────
# 唯一對外的入口；下游服務（8771、8772）請用雲安全組關閉外部訪問
#
# v3 變更:
#   ✅ 掛載 apps.yaml 到 auth-api 容器（/auth/apps 端點 + render_nginx.py 用）
#   ✅ nginx.conf 由 deploy.sh 從 apps.yaml 渲染生成（新增看板只改 apps.yaml）
#
# v2 修復回顧:
#   ✅ 去掉 version（Compose v2 已淘汰）
#   ✅ users.yaml 改為可寫掛載（讓容器內的 manage.py 能直接寫）
#   ✅ healthcheck 用輕量的 /auth/health
#   ✅ 加 logging driver 限制 log 大小
#   ✅ 網絡命名，方便日後把下游 join 進來

services:
  auth-api:
    build: ./auth-api
    container_name: gw_auth
    restart: always
    environment:
      SECRET_KEY: ${SECRET_KEY:?請先執行 deploy.sh 生成 .env 文件}
    volumes:
      # users.yaml 可寫 — 讓容器內執行的 manage.py 能直接修改
      - ./users.yaml:/app/users.yaml
      # apps.yaml 唯讀掛載（看板註冊表）
      - ./apps.yaml:/app/apps.yaml:ro
    expose:
      - "8000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - gw_net

  gateway:
    image: nginx:1.27-alpine
    container_name: gw_nginx
    restart: always
    depends_on:
      auth-api:
        condition: service_healthy
    ports:
      - "${GW_PORT:-8770}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./portal.html:/usr/share/nginx/html/portal.html:ro
    extra_hosts:
      # Linux 下讓容器能用 host.docker.internal 找到宿主機
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/auth/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - gw_net

networks:
  gw_net:
    name: gw_net
    driver: bridge
