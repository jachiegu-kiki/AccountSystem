# ═══════════════════════════════════════════════════════════════
#  新東方數據平台 · Gateway Nginx（由 apps.yaml 自動生成）
# ═══════════════════════════════════════════════════════════════
#  ⚠  此文件由 auth-api/render_nginx.py 從 apps.yaml 生成
#     請勿手動編輯 — 改動路由請改 apps.yaml，再跑 deploy.sh
# ═══════════════════════════════════════════════════════════════

upstream auth_api {
    server auth-api:8000;
    keepalive 16;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    absolute_redirect    off;
    server_tokens        off;
    client_max_body_size 50m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options        SAMEORIGIN always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;

    gzip on;
    gzip_types text/css application/javascript application/json text/xml image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary on;

    # ══════════════════════════════════════════════════════════
    #  認證子請求（通用 /auth/check）
    # ══════════════════════════════════════════════════════════

    location = /auth/check {
        internal;
        proxy_pass                  http://auth_api/auth/check;
        proxy_pass_request_body     off;
        proxy_set_header            Content-Length "";
        proxy_set_header            X-Original-URI $request_uri;
        proxy_set_header            X-Real-IP      $remote_addr;
        proxy_set_header            Cookie         $http_cookie;
    }

    # /finance 絕對 API 的 check：把 URI 前綴補上 /finance 再驗
    location = /auth/check_finance {
        internal;
        proxy_pass                  http://auth_api/auth/check;
        proxy_pass_request_body     off;
        proxy_set_header            Content-Length "";
        proxy_set_header            X-Original-URI /finance$request_uri;
        proxy_set_header            X-Real-IP      $remote_addr;
        proxy_set_header            Cookie         $http_cookie;
    }

    # ══════════════════════════════════════════════════════════
    #  Auth 對外端點
    # ══════════════════════════════════════════════════════════

    location /auth/ {
        proxy_pass                  http://auth_api;
        proxy_set_header            Host              $http_host;
        proxy_set_header            X-Real-IP         $remote_addr;
        proxy_set_header            X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header            X-Forwarded-Proto $scheme;
        proxy_set_header            X-Forwarded-Host  $http_host;
        proxy_http_version          1.1;
    }

    # ══════════════════════════════════════════════════════════
    #  Portal 首頁
    # ══════════════════════════════════════════════════════════

    location = /portal {
        auth_request                /auth/check;
        error_page 401 = @login_redirect;
        error_page 403 = @forbidden;

        default_type                text/html;
        alias                       /usr/share/nginx/html/portal.html;
        add_header Cache-Control    "no-cache, no-store, must-revalidate" always;
    }

    # ══════════════════════════════════════════════════════════
    #  項目：财务数据分析  (finance)
    #  下游: host.docker.internal:8771
    # ══════════════════════════════════════════════════════════

    location /finance/ {
        auth_request                /auth/check;
        error_page 401 = @login_redirect;
        error_page 403 = @forbidden;

        # ── 從 /auth/check 子請求回傳中抓取身份 header ──
        auth_request_set $auth_user                $upstream_http_x_auth_user;
        auth_request_set $auth_gw_role             $upstream_http_x_auth_gw_role;
        auth_request_set $auth_role                $upstream_http_x_auth_role;
        auth_request_set $auth_dept_scope          $upstream_http_x_auth_dept_scope;
        auth_request_set $auth_advisor_name        $upstream_http_x_auth_advisor_name;
        auth_request_set $auth_scope               $upstream_http_x_auth_scope;
        auth_request_set $auth_display_name        $upstream_http_x_auth_display_name;
        auth_request_set $auth_extras              $upstream_http_x_auth_extras;

        rewrite ^/finance/(.*)$     /$1 break;
        proxy_pass                  http://host.docker.internal:8771;

        # ── 統一注入全部 X-Auth-* 給下游（下游按需消費）──
        proxy_set_header X-Auth-User            $auth_user;
        proxy_set_header X-Auth-Gw-Role         $auth_gw_role;
        proxy_set_header X-Auth-Role            $auth_role;
        proxy_set_header X-Auth-Dept-Scope      $auth_dept_scope;
        proxy_set_header X-Auth-Advisor-Name    $auth_advisor_name;
        proxy_set_header X-Auth-Scope           $auth_scope;
        proxy_set_header X-Auth-Display-Name    $auth_display_name;
        proxy_set_header X-Auth-Extras          $auth_extras;

        # ── 標準 proxy header ──
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-Prefix /finance;

        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection $connection_upgrade;

        proxy_redirect      ~^http://[^/]+(/.*)$  /finance$1;
        proxy_buffering     off;
        proxy_read_timeout  300s;
    }
    location = /finance { return 302 /finance/; }

    # ── 财务数据分析 的絕對 API: /api/* ──
    location /api/ {
        auth_request                /auth/check_finance;
        error_page 401 = @login_redirect;
        error_page 403 = @forbidden;

        auth_request_set $auth_user                $upstream_http_x_auth_user;
        auth_request_set $auth_gw_role             $upstream_http_x_auth_gw_role;
        auth_request_set $auth_role                $upstream_http_x_auth_role;
        auth_request_set $auth_dept_scope          $upstream_http_x_auth_dept_scope;
        auth_request_set $auth_advisor_name        $upstream_http_x_auth_advisor_name;
        auth_request_set $auth_scope               $upstream_http_x_auth_scope;
        auth_request_set $auth_display_name        $upstream_http_x_auth_display_name;
        auth_request_set $auth_extras              $upstream_http_x_auth_extras;

        proxy_pass                  http://host.docker.internal:8771;

        proxy_set_header X-Auth-User            $auth_user;
        proxy_set_header X-Auth-Gw-Role         $auth_gw_role;
        proxy_set_header X-Auth-Role            $auth_role;
        proxy_set_header X-Auth-Dept-Scope      $auth_dept_scope;
        proxy_set_header X-Auth-Advisor-Name    $auth_advisor_name;
        proxy_set_header X-Auth-Scope           $auth_scope;
        proxy_set_header X-Auth-Display-Name    $auth_display_name;
        proxy_set_header X-Auth-Extras          $auth_extras;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_http_version 1.1;

        proxy_buffering     off;
        proxy_read_timeout  300s;
    }

    # ══════════════════════════════════════════════════════════
    #  項目：产品数据分析  (product)
    #  下游: host.docker.internal:8772
    # ══════════════════════════════════════════════════════════

    location /product/ {
        auth_request                /auth/check;
        error_page 401 = @login_redirect;
        error_page 403 = @forbidden;

        # ── 從 /auth/check 子請求回傳中抓取身份 header ──
        auth_request_set $auth_user                $upstream_http_x_auth_user;
        auth_request_set $auth_gw_role             $upstream_http_x_auth_gw_role;
        auth_request_set $auth_role                $upstream_http_x_auth_role;
        auth_request_set $auth_dept_scope          $upstream_http_x_auth_dept_scope;
        auth_request_set $auth_advisor_name        $upstream_http_x_auth_advisor_name;
        auth_request_set $auth_scope               $upstream_http_x_auth_scope;
        auth_request_set $auth_display_name        $upstream_http_x_auth_display_name;
        auth_request_set $auth_extras              $upstream_http_x_auth_extras;

        rewrite ^/product/(.*)$     /$1 break;
        proxy_pass                  http://host.docker.internal:8772;

        # ── 統一注入全部 X-Auth-* 給下游（下游按需消費）──
        proxy_set_header X-Auth-User            $auth_user;
        proxy_set_header X-Auth-Gw-Role         $auth_gw_role;
        proxy_set_header X-Auth-Role            $auth_role;
        proxy_set_header X-Auth-Dept-Scope      $auth_dept_scope;
        proxy_set_header X-Auth-Advisor-Name    $auth_advisor_name;
        proxy_set_header X-Auth-Scope           $auth_scope;
        proxy_set_header X-Auth-Display-Name    $auth_display_name;
        proxy_set_header X-Auth-Extras          $auth_extras;

        # ── 標準 proxy header ──
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-Prefix /product;

        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection $connection_upgrade;

        proxy_redirect      ~^http://[^/]+(/.*)$  /product$1;
        proxy_buffering     off;
        proxy_read_timeout  300s;
    }
    location = /product { return 302 /product/; }

    # ══════════════════════════════════════════════════════════
    #  根 + 錯誤
    # ══════════════════════════════════════════════════════════

    location = / { return 302 /portal; }

    location @login_redirect { return 302 /auth/login; }

    location @forbidden {
        default_type text/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        return 403 '<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="utf-8"><title>403</title>
<style>body{display:flex;align-items:center;justify-content:center;min-height:100vh;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f0;color:#555;margin:0}
.c{text-align:center;padding:20px}h1{font-size:64px;color:#ddd;margin:0 0 8px}p{margin:8px 0}
a{color:#1d9e75;text-decoration:none}a:hover{text-decoration:underline}</style></head><body><div class="c">
<h1>403</h1><p>你沒有權限查看此頁面</p>
<p><a href="/portal">返回首頁</a> · <a href="/auth/logout">換個帳號</a></p>
</div></body></html>';
    }

    location = /favicon.ico {
        return 204;
        access_log off;
        log_not_found off;
    }
}
