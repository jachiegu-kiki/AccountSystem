<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>广州前途数据平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#f5f5f0;color:#2c2c2a;padding:40px 20px}
.wrap{max-width:720px;margin:0 auto}
.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;
  flex-wrap:wrap;gap:12px}
h1{font-size:22px;font-weight:600}
.user{font-size:13px;color:#888}
.user strong{color:#2c2c2a;font-weight:500}
.user a{color:#1d9e75;text-decoration:none;margin-left:12px}
.user a:hover{text-decoration:underline}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.card{background:#fff;border-radius:12px;padding:28px 24px;
  box-shadow:0 1px 8px rgba(0,0,0,.06);text-decoration:none;color:inherit;
  transition:transform .15s,box-shadow .15s;display:block}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.1)}
.icon{font-size:28px;margin-bottom:12px}
.card h2{font-size:16px;font-weight:500;margin-bottom:6px}
.card p{font-size:13px;color:#888;line-height:1.5}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;
  background:#e1f5ee;color:#0f6e56;margin-bottom:16px}
.hidden{display:none}
.loading,.empty,.error{text-align:center;padding:60px;color:#888;font-size:14px}
.error{color:#e24b4a}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>广州前途数据平台</h1>
    <div class="user">
      <span id="greet"></span>
      <a href="/auth/logout">登出</a>
    </div>
  </div>
  <div id="loading" class="loading">加载中…</div>
  <div id="error"   class="error hidden"></div>
  <div id="apps"    class="grid hidden"></div>
</div>
<script>
/* v3: 看板清單改從 /auth/apps 動態讀取（由後端基於 apps.yaml + 當前用戶的
   roles.paths 過濾後回傳）。新增看板不再需要改此文件。*/

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

function showError(msg) {
  document.getElementById("loading").classList.add("hidden");
  const el = document.getElementById("error");
  el.textContent = msg;
  el.classList.remove("hidden");
}

async function load() {
  try {
    // 並行取 me + apps
    const [meRes, appsRes] = await Promise.all([
      fetch("/auth/me",   {credentials: "same-origin"}),
      fetch("/auth/apps", {credentials: "same-origin"}),
    ]);

    if (meRes.status === 401 || appsRes.status === 401) {
      location.href = "/auth/login";
      return;
    }
    if (!meRes.ok)   throw new Error("me HTTP " + meRes.status);
    if (!appsRes.ok) throw new Error("apps HTTP " + appsRes.status);

    const me = await meRes.json();
    const apps = await appsRes.json();

    document.getElementById("greet").innerHTML =
      "<strong>" + escapeHtml(me.display_name || me.username) + "</strong>" +
      " <span>(" + escapeHtml(me.role) + ")</span>";

    const grid = document.getElementById("apps");

    apps.forEach(a => {
      const el = document.createElement("a");
      el.className = "card";
      el.href = a.path;
      el.innerHTML =
        '<div class="icon">'  + (a.icon || '📂') + '</div>' +
        '<div class="badge">' + escapeHtml(a.tag  || '')   + '</div>' +
        '<h2>'                + escapeHtml(a.name || a.id) + '</h2>' +
        '<p>'                 + escapeHtml(a.desc || '')   + '</p>';
      grid.appendChild(el);
    });

    if (apps.length === 0) {
      grid.innerHTML = '<p class="empty" style="grid-column:1/-1">' +
        '你的帐号目前没有可查看的报表，请联系管理员</p>';
    }

    document.getElementById("loading").classList.add("hidden");
    grid.classList.remove("hidden");
  } catch (err) {
    console.error(err);
    showError("载入失败，请重新整理页面或联系管理员");
  }
}

load();
</script>
</body>
</html>
